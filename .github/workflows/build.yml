name: Android Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show repository info
        if: always()
        run: |
          echo "PWD=$(pwd)"
          echo "ROOT FILES:"
          ls -la
          echo "SEARCH gradlew:"
          find . -maxdepth 4 -name "gradlew" -type f
          echo "SEARCH build.gradle/build.gradle.kts:"
          find . -maxdepth 4 \( -name "build.gradle" -o -name "build.gradle.kts" -o -name "settings.gradle" -o -name "settings.gradle.kts" \) -type f

      - name: Make gradlew executable if exists
        if: always()
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "Using root gradlew"
          elif [ -f "./android/gradlew" ]; then
            chmod +x ./android/gradlew
            echo "Using android/gradlew"
          else
            echo "No gradlew found, will try system gradle"
          fi

      - name: Decode google-services.json from secret
        if: always()
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            mkdir -p app
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode --ignore-garbage > app/google-services.json
            echo "google-services.json created in app/"
            ls -lh app/google-services.json
            file app/google-services.json || true
          else
            echo "GOOGLE_SERVICES_JSON_BASE64 secret not set, skipping"
          fi

      - name: Decode release keystore from secret
        if: always()
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode --ignore-garbage > "$GITHUB_WORKSPACE/release.keystore"
            echo "release.keystore created"
            ls -lh "$GITHUB_WORKSPACE/release.keystore"
            file "$GITHUB_WORKSPACE/release.keystore" || true
          else
            echo "KEYSTORE_BASE64 secret not set"
          fi

      - name: Build Debug APK with gradlew
        id: build_debug_gradlew
        if: always()
        continue-on-error: true
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug --stacktrace --warning-mode all
          elif [ -f "./android/gradlew" ]; then
            cd android
            ./gradlew assembleDebug --stacktrace --warning-mode all
          else
            echo "gradlew not found"
            exit 1
          fi

      - name: Build Debug APK with system gradle fallback
        if: always() && steps.build_debug_gradlew.outcome == 'failure'
        continue-on-error: true
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          gradle assembleDebug --stacktrace --warning-mode all

      - name: Build Release APK with gradlew
        id: build_release_gradlew
        if: always()
        continue-on-error: true
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleRelease --stacktrace --warning-mode all
          elif [ -f "./android/gradlew" ]; then
            cd android
            ./gradlew assembleRelease --stacktrace --warning-mode all
          else
            echo "gradlew not found"
            exit 1
          fi

      - name: Build Release APK with system gradle fallback
        if: always() && steps.build_release_gradlew.outcome == 'failure'
        continue-on-error: true
        env:
          RELEASE_KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          gradle assembleRelease --stacktrace --warning-mode all

      - name: Locate APKs and build outputs
        if: always()
        run: |
          echo "APK files:"
          find . -type f -name "*.apk" | sort || true
          echo "AAB files:"
          find . -type f -name "*.aab" | sort || true
          echo "Outputs folders:"
          find . -type d -path "*/build/outputs/*" | sort || true

      - name: Upload Debug APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/*debug*/*.apk
            **/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload Release APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/apk/*release*/*.apk
            **/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload All APKs and AABs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-android-outputs
          path: |
            **/build/outputs/apk/**/*.apk
            **/build/outputs/bundle/**/*.aab
          if-no-files-found: warn
